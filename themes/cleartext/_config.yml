# Cleartext Theme v3.0 — Configuration
# Enterprise-Grade Hexo Theme for GitHub Pages
# 中文注释版：每个配置项均有通俗说明

# ==========================================
# 主题信息（不要修改）
# ==========================================
version: "3.0.0"

# ==========================================
# 配色方案 — 修改后可自定义主题颜色
# primary：标题/主文字色  accent：链接/强调色
# background：页面背景色  text：正文色
# ==========================================
color_scheme:
  primary: "#1e293b"           # 主色调（深蓝灰）
  accent: "#0ea5e9"            # 强调色（天蓝，链接和按钮）
  background: "#f8fafc"        # 页面背景色
  text: "#334155"              # 正文文字颜色

# ==========================================
# 导航菜单 — 键为菜单显示名称，值为链接路径
# 增减菜单项直接在这里加减行即可
# ==========================================
menu:
  首页: /               # 博客首页（文章列表）
  归档: /archives/       # 按年份归档所有文章
  分类: /categories/     # 按分类浏览文章
  标签: /tags/           # 标签云 + 按标签筛选
  关于: /about/          # 关于页面（需要在 source/about 下创建）
  友链: /link/           # 友情链接页面

# ==========================================
# 侧边栏 — 仅在首页显示，列出常用信息
# enable: true 开启 / false 关闭
# widgets: 选择要显示的组件，可增减或排序
#   - recent_posts 最新文章
#   - categories   分类列表
#   - tag_cloud    标签云
#   - archives     归档列表
# ==========================================
sidebar:
  enable: true           # 是否在首页显示侧边栏
  widgets:               # 侧边栏组件（按顺序显示）
    - recent_posts       # 最新文章
    - categories         # 分类
    - tag_cloud          # 标签云
    - archives           # 归档

# ==========================================
# 文章目录 (Table of Contents)
# 仅在文章页显示，帮助读者快速跳转章节
# enable: true 开启 / false 关闭
# max_depth: 目录深度，4 表示显示 h2~h5 标题
# sticky: 桌面端目录是否固定定位（滚动时始终可见）
# ==========================================
toc:
  enable: true           # 是否开启文章目录
  max_depth: 4           # 最大标题层级（h2=2, h3=3, h4=4, h5=5）
  sticky: true           # 桌面端固定定位（跟随屏幕滚动）

# ==========================================
# 站内搜索
# enable: true 开启 / false 关闭
# placeholder: 搜索框提示文字
# shortcut: 键盘快捷键（Ctrl+K 打开搜索）
# ==========================================
search:
  enable: true           # 是否开启站内搜索
  placeholder: "搜索文章..."  # 搜索框占位提示
  shortcut: "Ctrl+K"     # 快捷键

# ==========================================
# 深色模式
# enable: true 开启 / false 关闭
# default: 默认模式
#   auto — 跟随系统（推荐）
#   light — 始终浅色
#   dark — 始终深色
# ==========================================
dark_mode:
  enable: true           # 是否允许切换深色模式
  default: auto          # 默认模式：auto/light/dark
  storage_key: "cleartext-theme-mode"  # 本地存储键名（不要改）

# ==========================================
# 评论系统 (Giscus)
# 基于 GitHub Discussions 的评论，免费无广告
# 使用前需在 GitHub 仓库安装 Giscus App
# 并获取 repo / repo_id / category / category_id
# 详见：https://giscus.app/zh-CN
# ==========================================
comments:
  giscus:
    enable: false        # 是否开启评论（默认关闭，需配置）
    repo: ""             # GitHub 仓库，格式：用户名/仓库名
    repo_id: ""          # 仓库 ID（从 giscus.app 获取）
    category: ""         # Discussion 分类名
    category_id: ""      # 分类 ID（从 giscus.app 获取）
    mapping: "pathname"  # 页面与 Discussion 的映射方式
    strict: "0"          # 严格匹配模式
    reactions_enabled: "1"  # 是否显示 reactions
    emit_metadata: "0"   # 是否发送 metadata
    input_position: "bottom"  # 评论输入框位置
    lang: "zh-CN"        # 界面语言
    loading: "lazy"      # 加载策略（lazy 延迟加载）

# ==========================================
# 文章设置
# date_format: 日期显示格式
# word_count: 是否显示字数统计
# reading_time: 是否显示预计阅读时间
# excerpt_limit: 摘要截取字数
# ==========================================
article:
  date_format: "YYYY-MM-DD"   # 日期格式
  word_count: true            # 显示字数
  reading_time: true          # 显示阅读时间
  excerpt_limit: 200          # 文章摘要字数上限

# ==========================================
# 文章上下篇导航
# enable: true 显示上一篇/下一篇链接
# ==========================================
post_nav:
  enable: true           # 是否显示文章底部导航

# ==========================================
# 社交链接（页脚显示）
# 留空则不显示对应图标
# ==========================================
social:
  github: ""             # GitHub 主页链接
  twitter: ""            # Twitter 链接
  email: ""              # 邮箱地址
  rss: ""                # RSS 订阅链接

# ==========================================
# 页脚设置
# copyright: 是否显示版权信息
# powered: 是否显示 "Powered by Hexo & Cleartext"
# since: 建站年份，如 2024（显示为 2024-2026）
# ==========================================
footer:
  copyright: true        # 显示版权信息
  powered: true          # 显示 Hexo 驱动标识
  since: ""              # 建站年份（留空不显示）

# ==========================================
# SEO 优化
# 全部开启即可，无需修改
# ==========================================
seo:
  enable: true           # SEO 总开关
  structured_data: true  # 结构化数据（搜索引擎友好）
  open_graph: true       # Open Graph 标签（社交分享用）
  twitter_card: true     # Twitter 卡片
  canonical: true        # 规范链接（避免重复内容）

# ==========================================
# 代码高亮
# enable: 是否启用代码语法高亮
# theme: highlight.js 主题名称
#   atom-one-dark（深色）/ github（浅色）/ monokai 等
# copy_button: 代码块右上角显示复制按钮
# show_lang: 代码块顶部显示编程语言名称
# ==========================================
code_highlight:
  enable: true           # 是否开启代码高亮
  theme: "atom-one-dark" # highlight.js 主题
  copy_button: true      # 显示复制按钮
  show_lang: true        # 显示语言标签

# ==========================================
# 数学公式 (MathJax)
# enable: true 开启全局支持
# 也可在文章 front-matter 中按篇开启：math: true
# ==========================================
math:
  enable: false          # 是否全局开启数学公式（推荐按需开启）

# ==========================================
# 多栏布局 (Columns)
# 在 Markdown 中使用：
# {% columns 2 %} ... {% endcolumns %}
# 可实现两栏或三栏并排
# ==========================================
columns:
  enable: true           # 是否开启多栏布局

# ==========================================
# 提示框 (Callouts)
# 在 Markdown 中使用 blockquote 并指定类型
# 支持 info / warning / tip / danger 四种
# ==========================================
callout:
  enable: true           # 是否开启提示框

# ==========================================
# 性能优化
# lazy_load_images: 图片懒加载（滚动到才加载）
# defer_non_critical_js: 非关键 JS 延迟加载
# preload_fonts: 预加载字体
# ==========================================
performance:
  lazy_load_images: true        # 图片懒加载
  defer_non_critical_js: true   # JS 延迟加载
  preload_fonts: true           # 字体预加载