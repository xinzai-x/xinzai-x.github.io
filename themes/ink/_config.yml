# Social links (shown in footer)
social:
  GitHub: https://github.com/xinzai-x/
  抖音: https://v.douyin.com/FENmELIAV9E/
  # Email: mailto:you@example.com
  # RSS: /atom.xml

# ---------- Layout ----------
# Sidebar position: left / right / false
sidebar: right

# Widgets shown in sidebar
widgets:
  - recent_posts
  - categories
  - tags

# ---------- Article ----------
# Excerpt length on index page (characters)
excerpt_length: 80

# Show read more link
excerpt_link: true

# Show reading time estimate
reading_time: true

# Show word count
word_count: true

# Show table of contents
toc: true

# Show post navigation (prev/next)
post_navigation: true

# Show author card at bottom of posts
post_author:
  enable: true
  avatar: # URL to avatar image
  bio: # Short bio

# Show copyright notice at bottom of posts
post_copyright: true

# Show share buttons
share: false

# ---------- Code Highlight ----------
highlight:
  enable: true
  line_number: true
  theme: default

# ---------- Comments ----------
# Supports: disqus / gitalk / valine / waline / twikoo
comments:
  enable: false
  # Choose one:
  # disqus_shortname: your-shortname
  # valine:
  #   app_id: your-app-id
  #   app_key: your-app-key

# ---------- Search ----------
search:
  enable: true
  path: search.xml
  field: post

# ---------- Appearance ----------
# Default color scheme: light / dark / auto
color_scheme: auto

# Font settings
font:
  body: '"Noto Serif SC", "Source Han Serif SC", "Hiragino Sans GB", "Microsoft YaHei", Georgia, serif'
  heading: '"Noto Sans SC", "Source Han Sans SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif'
  code: '"JetBrains Mono", "Fira Code", "Source Code Pro", Menlo, Monaco, Consolas, monospace'
  size: 16px
  line_height: 1.8

# Custom CSS / JS (paths relative to source/)
custom_css: []
custom_js: []

# ---------- Math ----------
math:
  enable: true
  # Options: katex (default) / mathjax
  engine: katex

# ---------- Analytics ----------
# google_analytics: UA-XXXXXXXX-X
# baidu_analytics: your-key
